name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }}${{ matrix.swipl && ' with SWI-Prolog' || '' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 20
            swipl: true
          - node: 24
            swipl: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Install SWI-Prolog
        if: matrix.swipl
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends swi-prolog-nox
      - run: npm ci
      - run: npm run verify
      - run: npm audit
